<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Capital Avanzada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .card-shadow { box-shadow: 0 4px 20px -2px rgba(0,0,0,0.05); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .error-shake { animation: shake 0.4s ease-in-out; border-color: #ef4444 !important; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .account-card {
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .account-card:hover {
            transform: translateY(-2px);
            background-color: white !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #e2e8f0;
        }
    </style>
</head>
<body class="text-slate-800 pb-10">

    <div class="max-w-5xl mx-auto px-4 py-8">
        <!-- Dashboard Header -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-8">
            <div>
                <h1 class="text-3xl font-extrabold text-slate-900 flex items-center gap-2">
                    <i class="fa-solid fa-wallet text-indigo-600"></i> Mi Capital
                </h1>
                <p class="text-slate-500 font-medium italic">Gestión inteligente de flujos</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <div class="bg-emerald-600 text-white p-4 rounded-2xl shadow-lg min-w-[150px]">
                    <p class="text-[10px] font-bold uppercase tracking-widest opacity-80 mb-1">Disponible</p>
                    <h2 id="total-disponible" class="text-xl font-black">$0.00</h2>
                </div>
                <div class="bg-blue-600 text-white p-4 rounded-2xl shadow-lg min-w-[150px]">
                    <p class="text-[10px] font-bold uppercase tracking-widest opacity-80 mb-1">Inversión</p>
                    <h2 id="total-inversiones" class="text-xl font-black">$0.00</h2>
                </div>
                <div class="bg-slate-800 text-white p-4 rounded-2xl shadow-lg min-w-[150px]">
                    <p class="text-[10px] font-bold uppercase tracking-widest opacity-80 mb-1">Neto Total</p>
                    <h2 id="total-neto" class="text-xl font-black">$0.00</h2>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Columna Registro -->
            <div class="lg:col-span-5 space-y-6">
                
                <section id="form-container" class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100 transition-all">
                    <h3 class="text-xs font-black uppercase tracking-widest mb-6 text-slate-400">Registrar Movimiento</h3>
                    <div class="space-y-4">
                        <input id="tx-desc" type="text" placeholder="Concepto (ej. Pago nómina)" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-2 border-transparent focus:border-indigo-100 font-medium">
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Monto</label>
                                <input id="tx-monto" type="number" placeholder="0.00" class="w-full p-4 bg-slate-50 rounded-xl outline-none font-bold border-2 border-transparent">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Categoría</label>
                                <select id="tx-tipo" class="w-full p-4 bg-slate-50 rounded-xl outline-none font-bold text-slate-600 border-2 border-transparent">
                                    <option value="ingreso">Ingreso (+)</option>
                                    <option value="gasto_fijo">Gasto Fijo (-)</option>
                                    <option value="gasto_variable">Gasto Variable (-)</option>
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase ml-2 mb-1 block">Cuenta vinculada</label>
                            <select id="tx-cuenta" class="w-full p-4 bg-slate-50 rounded-xl outline-none font-bold text-slate-600 border-2 border-transparent"></select>
                        </div>

                        <div id="error-msg" class="hidden text-rose-500 text-[11px] font-bold uppercase tracking-wider text-center bg-rose-50 p-3 rounded-xl border border-rose-100">
                            Error de validación
                        </div>

                        <button onclick="addTransaction()" class="w-full py-4 bg-indigo-600 text-white font-black rounded-xl shadow-lg hover:bg-indigo-700 transition-all active:scale-[0.98]">
                            Ejecutar Operación
                        </button>
                    </div>
                </section>

                <section class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100">
                    <div class="flex justify-between items-center mb-6">
                        <h3 class="text-xs font-black uppercase tracking-widest text-slate-400">Cuentas (Clic para editar)</h3>
                        <button onclick="openAddAccount()" class="text-[10px] font-black bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-lg hover:bg-indigo-100 uppercase transition-colors">
                            + Nueva
                        </button>
                    </div>
                    <div id="accounts-list" class="space-y-3"></div>
                </section>
            </div>

            <!-- Columna Historial -->
            <div class="lg:col-span-7">
                <section class="bg-white p-6 rounded-[2rem] card-shadow border border-slate-100 min-h-[500px]">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-xs font-black uppercase tracking-widest text-slate-400">Libro de Movimientos</h3>
                    </div>
                    <div id="tx-history" class="space-y-3"></div>
                </section>
            </div>
        </div>
    </div>

    <!-- Modal Gestión Cuenta -->
    <div id="edit-modal" class="fixed inset-0 z-50 hidden items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm">
        <div class="bg-white w-full max-w-sm p-8 rounded-[2.5rem] shadow-2xl">
            <h3 id="modal-title" class="text-xl font-bold mb-1">Detalles de Cuenta</h3>
            <p id="edit-account-name" class="text-xs font-bold text-indigo-500 uppercase mb-6"></p>
            
            <div id="modal-content" class="space-y-4"></div>

            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="closeModal()" class="py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl hover:bg-slate-200 transition-colors">Cerrar</button>
                <button id="modal-save-btn" class="py-4 bg-indigo-600 text-white font-bold rounded-2xl hover:bg-indigo-700 shadow-md">Guardar</button>
            </div>
            <button id="delete-acc-btn" class="w-full mt-3 py-2 text-rose-400 text-[10px] font-bold uppercase tracking-widest hover:text-rose-600 transition-colors">Eliminar Cuenta</button>
        </div>
    </div>

    <script>
        let state = JSON.parse(localStorage.getItem('finanzas_v4')) || {
            accounts: [
                { id: 1, name: 'Efectivo', balance: 2000, type: 'disponible' },
                { id: 2, name: 'S&P 500 ETF', balance: 8000, type: 'inversion' }
            ],
            txs: []
        };

        let currentEditingId = null;

        function save() {
            localStorage.setItem('finanzas_v4', JSON.stringify(state));
            render();
        }

        function notifyError(msg) {
            const container = document.getElementById('form-container');
            const errorLabel = document.getElementById('error-msg');
            errorLabel.innerText = msg;
            errorLabel.classList.remove('hidden');
            container.classList.add('error-shake');
            
            setTimeout(() => container.classList.remove('error-shake'), 500);
            setTimeout(() => errorLabel.classList.add('hidden'), 4000);
        }

        function addTransaction() {
            const desc = document.getElementById('tx-desc').value.trim();
            const monto = parseFloat(document.getElementById('tx-monto').value);
            const tipo = document.getElementById('tx-tipo').value;
            const accId = parseInt(document.getElementById('tx-cuenta').value);
            
            if (!accId || !desc || isNaN(monto) || monto <= 0) {
                notifyError("Verifica los datos del formulario");
                return;
            }

            const acc = state.accounts.find(a => a.id === accId);
            const esGasto = tipo.includes('gasto');

            // NUEVA REGLA: Solo disponible puede gastar
            if (esGasto && acc.type === 'inversion') {
                notifyError(`Las cuentas de Inversión no permiten gastos. Usa una cuenta 'Disponible'.`);
                return;
            }

            // REGLA: Saldo disponible
            if (esGasto && monto > acc.balance) {
                notifyError(`Saldo insuficiente en ${acc.name}. Máximo: $${acc.balance.toFixed(2)}`);
                return;
            }

            const finalMonto = esGasto ? -monto : monto;
            acc.balance += finalMonto;
            
            state.txs.unshift({
                id: Date.now(),
                desc,
                monto: finalMonto,
                account: acc.name,
                accType: acc.type,
                tipoLabel: tipo === 'ingreso' ? 'Ingreso' : (tipo === 'gasto_fijo' ? 'Gasto Fijo' : 'Gasto Variable'),
                date: new Date().toLocaleDateString('es-ES', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'})
            });

            document.getElementById('tx-desc').value = '';
            document.getElementById('tx-monto').value = '';
            save();
        }

        function deleteTx(id) {
            const idx = state.txs.findIndex(t => t.id === id);
            const tx = state.txs[idx];
            const acc = state.accounts.find(a => a.name === tx.account);
            if (acc) acc.balance -= tx.monto;
            state.txs.splice(idx, 1);
            save();
        }

        function openEdit(id) {
            currentEditingId = id;
            const acc = state.accounts.find(a => a.id === id);
            document.getElementById('modal-title').innerText = "Editar Cuenta";
            document.getElementById('edit-account-name').innerText = acc.name;
            document.getElementById('modal-content').innerHTML = `
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Nombre</label>
                        <input id="edit-name" type="text" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-100">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Tipo</label>
                        <select id="edit-type" class="w-full p-4 bg-slate-50 rounded-2xl font-bold outline-none border-2 border-transparent focus:border-indigo-100">
                            <option value="disponible" ${acc.type === 'disponible' ? 'selected' : ''}>Disponible</option>
                            <option value="inversion" ${acc.type === 'inversion' ? 'selected' : ''}>Inversión</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase ml-2">Saldo Actual</label>
                        <input id="edit-amount" type="number" step="0.01" class="w-full p-4 bg-slate-50 rounded-2xl text-2xl font-black text-center outline-none border-2 border-transparent focus:border-indigo-100">
                    </div>
                </div>
            `;
            document.getElementById('edit-name').value = acc.name;
            document.getElementById('edit-amount').value = acc.balance;
            document.getElementById('modal-save-btn').onclick = updateAccountData;
            document.getElementById('delete-acc-btn').onclick = () => deleteAccount(id);
            document.getElementById('delete-acc-btn').classList.remove('hidden');
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function updateAccountData() {
            const newName = document.getElementById('edit-name').value.trim();
            const newVal = parseFloat(document.getElementById('edit-amount').value);
            const newType = document.getElementById('edit-type').value;
            const acc = state.accounts.find(a => a.id === currentEditingId);
            
            if (newName && !isNaN(newVal)) {
                if (acc.name !== newName) {
                    state.txs.forEach(t => { if (t.account === acc.name) t.account = newName; });
                }
                acc.name = newName;
                acc.balance = newVal;
                acc.type = newType;
                closeModal();
                save();
            }
        }

        function openAddAccount() {
            document.getElementById('modal-title').innerText = "Nueva Cuenta";
            document.getElementById('edit-account-name').innerText = "Define el origen";
            document.getElementById('modal-content').innerHTML = `
                <div class="space-y-4">
                    <input id="new-acc-name" type="text" placeholder="Nombre (ej. Banco XYZ)" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                    <select id="new-acc-type" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                        <option value="disponible">Disponible</option>
                        <option value="inversion">Inversión</option>
                    </select>
                    <input id="new-acc-balance" type="number" placeholder="Saldo Inicial" class="w-full p-4 bg-slate-50 rounded-2xl outline-none font-bold">
                </div>
            `;
            document.getElementById('modal-save-btn').onclick = createAccount;
            document.getElementById('delete-acc-btn').classList.add('hidden');
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function createAccount() {
            const name = document.getElementById('new-acc-name').value.trim();
            const type = document.getElementById('new-acc-type').value;
            const balance = parseFloat(document.getElementById('new-acc-balance').value) || 0;
            if (name) {
                state.accounts.push({ id: Date.now(), name, balance, type });
                closeModal();
                save();
            }
        }

        function deleteAccount(id) {
            if(state.accounts.length > 1) {
                state.accounts = state.accounts.filter(a => a.id !== id);
                closeModal();
                save();
            } else {
                alert("Debes mantener al menos una cuenta activa.");
            }
        }

        function closeModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        function render() {
            const accList = document.getElementById('accounts-list');
            const accSelect = document.getElementById('tx-cuenta');
            const txHistory = document.getElementById('tx-history');
            
            let totalDisp = 0;
            let totalInv = 0;

            accList.innerHTML = '';
            accSelect.innerHTML = '';

            state.accounts.forEach(acc => {
                if (acc.type === 'inversion') totalInv += acc.balance;
                else totalDisp += acc.balance;

                accSelect.innerHTML += `<option value="${acc.id}">${acc.name} (${acc.type === 'inversion' ? 'Inversión' : 'Disponible'})</option>`;
                
                accList.innerHTML += `
                    <div onclick="openEdit(${acc.id})" class="account-card flex justify-between items-center p-5 bg-slate-50/70 rounded-2xl border border-transparent">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 rounded-full flex items-center justify-center ${acc.type === 'inversion' ? 'bg-blue-100 text-blue-600' : 'bg-emerald-100 text-emerald-600'}">
                                <i class="fa-solid ${acc.type === 'inversion' ? 'fa-chart-line' : 'fa-money-bill-wave'} text-xs"></i>
                            </div>
                            <div>
                                <p class="font-bold text-slate-900 text-sm leading-tight">${acc.name}</p>
                                <span class="text-[8px] font-black uppercase tracking-tighter opacity-60">
                                    ${acc.type === 'inversion' ? 'Inversión' : 'Disponible'}
                                </span>
                            </div>
                        </div>
                        <div class="text-right">
                            <span class="font-black text-slate-900 text-base">$${acc.balance.toLocaleString('es-ES', {minimumFractionDigits: 2})}</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('total-disponible').innerText = `$${totalDisp.toLocaleString('es-ES', {minimumFractionDigits: 2})}`;
            document.getElementById('total-inversiones').innerText = `$${totalInv.toLocaleString('es-ES', {minimumFractionDigits: 2})}`;
            document.getElementById('total-neto').innerText = `$${(totalDisp + totalInv).toLocaleString('es-ES', {minimumFractionDigits: 2})}`;

            txHistory.innerHTML = state.txs.map(tx => `
                <div class="flex justify-between items-center p-4 border-b border-slate-50 group hover:bg-slate-50/50 rounded-2xl transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-9 h-9 rounded-lg flex items-center justify-center ${tx.monto > 0 ? 'bg-emerald-50 text-emerald-500' : 'bg-rose-50 text-rose-500'}">
                            <i class="fa-solid ${tx.monto > 0 ? 'fa-arrow-up' : 'fa-arrow-down'} text-[10px]"></i>
                        </div>
                        <div>
                            <p class="font-bold text-slate-800 text-sm">${tx.desc}</p>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">
                                ${tx.date} • <span class="text-slate-600">${tx.account}</span> 
                            </p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <span class="font-black text-sm ${tx.monto > 0 ? 'text-emerald-500' : 'text-slate-900'}">
                            ${tx.monto > 0 ? '+' : '-'}$${Math.abs(tx.monto).toLocaleString('es-ES', {minimumFractionDigits: 2})}
                        </span>
                        <button onclick="deleteTx(${tx.id})" class="opacity-0 group-hover:opacity-100 text-slate-300 hover:text-rose-500 transition-all p-2">
                            <i class="fa-solid fa-trash-can text-[10px]"></i>
                        </button>
                    </div>
                </div>
            `).join('') || `
                <div class="flex flex-col items-center justify-center py-20 text-slate-300">
                    <i class="fa-solid fa-layer-group text-4xl mb-4 opacity-10"></i>
                    <p class="text-xs font-bold uppercase tracking-widest opacity-40">Sin actividad registrada</p>
                </div>
            `;
        }

        // Init
        render();
    </script>
</body>
</html>
